<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Slash Rush</title>
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="camera-stage" aria-label="Camera detection workspace">
        <video id="camera" playsinline muted></video>
        <div id="scene3d" aria-hidden="true"></div>
        <canvas id="overlay"></canvas>
        <div class="top-bar">
          <div>
            <h1>Slash Rush</h1>
            <p id="statusText">Camera idle</p>
          </div>
          <div class="control-stack">
            <div class="mode-toggle" aria-label="Mode">
              <button id="gameModeButton" class="mode-button active" type="button">Slash Game</button>
              <button id="trainerModeButton" class="mode-button" type="button">Gesture Trainer</button>
            </div>
            <button id="cameraButton" type="button">
              <span class="button-icon" aria-hidden="true">●</span>
              Start game
            </button>
          </div>
        </div>
        <div class="metric-strip" aria-live="polite">
          <div>
            <span id="metricOneLabel" class="metric-label">Score</span>
            <strong id="scoreValue">0</strong>
          </div>
          <div>
            <span id="metricTwoLabel" class="metric-label">Streak</span>
            <strong id="streakValue">0</strong>
          </div>
          <div>
            <span id="metricThreeLabel" class="metric-label">Time</span>
            <strong id="timeValue">60</strong>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./src/app.js?v=gesture-trainer-1"></script>
  </body>
</html>
