<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gesture Lab</title>
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="camera-stage" aria-label="Camera detection workspace">
        <video id="camera" playsinline muted></video>
        <div id="scene3d" aria-hidden="true"></div>
        <canvas id="overlay"></canvas>
        <div class="top-bar">
          <div>
            <h1>Gesture Lab</h1>
            <p id="statusText">Camera idle</p>
          </div>
          <div class="control-stack">
            <div class="mode-toggle hidden" aria-label="Mode">
              <button id="captureModeButton" class="mode-button active" type="button">Capture</button>
              <button id="sandboxModeButton" class="mode-button" type="button">Sandbox</button>
            </div>
            <select id="gestureSelect" class="gesture-select hidden" aria-label="Gesture">
              <option value="pinch-click">Pinch click</option>
              <option value="pinch-drag">Pinch drag</option>
              <option value="swipe-left">Swipe left</option>
              <option value="swipe-right">Swipe right</option>
              <option value="zoom-in">Zoom in</option>
              <option value="zoom-out">Zoom out</option>
            </select>
            <button id="cameraButton" type="button">
              <span class="button-icon" aria-hidden="true">●</span>
              Start camera
            </button>
            <button id="recordButton" class="hidden" type="button" disabled>
              Record sample
            </button>
          </div>
        </div>
        <div class="metric-strip" aria-live="polite">
          <div>
            <span id="metricOneLabel" class="metric-label">Gesture</span>
            <strong id="scoreValue">0</strong>
          </div>
          <div>
            <span id="metricTwoLabel" class="metric-label">Samples</span>
            <strong id="streakValue">0</strong>
          </div>
          <div>
            <span id="metricThreeLabel" class="metric-label">State</span>
            <strong id="timeValue">Idle</strong>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./src/app.js?v=sandbox-rules-1"></script>
  </body>
</html>
